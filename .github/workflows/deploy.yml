name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd personal-site
          bun install --frozen-lockfile
          bun run build

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # Install Bun if not present
            if ! command -v bun &> /dev/null; then
              curl -fsSL https://bun.sh/install | bash
              echo 'export BUN_INSTALL="$HOME/.bun"' >> ~/.bashrc
              echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> ~/.bashrc
            fi
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            # Install Node.js if not present
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo bash -
              sudo apt-get install -y nodejs
            fi

            # Install ucode-lsp globally if not present
            if ! command -v ucode-lsp &> /dev/null; then
              sudo npm install -g ucode-lsp
            fi

            # Install .NET 6.0 if not present
            if ! command -v dotnet &> /dev/null; then
              curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
              chmod +x /tmp/dotnet-install.sh
              /tmp/dotnet-install.sh --channel 6.0 --runtime dotnet --install-dir /usr/share/dotnet
              sudo ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
            fi

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "webserver/,personal-site/build/"
          target: "~/app"
          overwrite: true

      - name: Install dependencies and restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            # Install webserver dependencies
            cd ~/app/webserver
            bun install --frozen-lockfile

            # Copy frontend build to nginx
            sudo rm -rf /var/www/html/*
            sudo cp -r ~/app/personal-site/build/* /var/www/html/

            # Set up systemd services if not already configured
            if [ ! -f /etc/systemd/system/personal-website.service ]; then
              sudo tee /etc/systemd/system/personal-website.service > /dev/null << 'UNIT'
            [Unit]
            Description=Personal Website Backend
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/home/ubuntu/app/webserver
            Environment=BUN_INSTALL=/home/ubuntu/.bun
            Environment=PATH=/home/ubuntu/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            ExecStart=/home/ubuntu/.bun/bin/bun run app.js
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            UNIT
              sudo systemctl daemon-reload
              sudo systemctl enable personal-website
            fi

            # Restart the backend
            sudo systemctl restart personal-website

            # Reload nginx
            sudo systemctl reload nginx
