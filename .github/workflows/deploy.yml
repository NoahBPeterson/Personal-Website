name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd personal-site
          bun install --frozen-lockfile
          bun run build

      - name: Ensure runtime dependencies
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            export PATH="/snap/bin:$PATH"
            command -v bun || curl -fsSL https://bun.sh/install | bash
            command -v ucode-lsp || sudo npm install -g ucode-lsp

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "webserver/,personal-site/build/"
          target: "~/app"
          overwrite: true

      - name: Create systemd service file
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            printf '%s\n' '[Unit]' 'Description=Personal Website Backend' 'After=network.target' '' '[Service]' 'Type=simple' 'User=ubuntu' 'WorkingDirectory=/home/ubuntu/app/webserver' 'Environment=BUN_INSTALL=/home/ubuntu/.bun' 'Environment=PATH=/snap/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin' 'ExecStart=/snap/bin/bun run app.js' 'Restart=always' 'RestartSec=5' '' '[Install]' 'WantedBy=multi-user.target' | sudo tee /etc/systemd/system/personal-website.service > /dev/null
            sudo systemctl daemon-reload
            sudo systemctl enable personal-website

      - name: Install deps and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            export PATH="/snap/bin:$PATH"
            cd ~/app/webserver
            bun install --frozen-lockfile
            sudo rm -rf /var/www/html/*
            sudo cp -r ~/app/personal-site/build/* /var/www/html/
            sudo systemctl restart personal-website
            sudo systemctl reload nginx
            echo "Deploy complete"
